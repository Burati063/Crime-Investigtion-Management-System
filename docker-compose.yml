
services:
  postgres-federal:
    image: postgres:16
    container_name: postgres_federal
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    volumes:
      - federal_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - db_net
  federal:
    build:
      context: ./fedral_police_department-managment_system_backend
      dockerfile: Dockerfile
    container_name: federal
    depends_on:
      - postgres-federal
    env_file:
      - .env
    ports:
      - "8080:8080"
    

    networks:
      - api_net
      - db_net
  federal_front:
    build:
      context: ./integeratd-crime-investigation-system-1ca964fbc587f873a6d33aea9def0ae0f0c622dc
      dockerfile: Dockerfile
    container_name: federal_front
   
    env_file:
      - .env
    ports:
      - "3000:3000"
    

    networks:
      - api_net
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_federal
    depends_on:
      - federal
      - federal_front
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - api_net
volumes:
  federal_data:

networks:
  api_net:
    driver: bridge
  db_net:
    driver: bridge
