user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # All /api/* requests go to the Flask backend.
        # The URI is forwarded AS-IS (no rewrite) so Flask receives
        # /api/auth/login, /api/users/, etc. which match its blueprints.
        location /api/ {
            proxy_pass         http://federal:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Exact match for /api (no trailing slash) — redirect to /api/
        location = /api {
            return 301 /api/;
        }

        # Everything else goes to the Next.js frontend
        location / {
            proxy_pass         http://federal_front:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
